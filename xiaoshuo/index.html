<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>小说目录</title>

<style>
body{
    font-family: serif;
    max-width:800px;
    margin:auto;
    line-height:1.8;
}

h1{
    text-align:center;
}

.chapter{
    display:block;
    padding:10px;
    border-bottom:1px solid #eee;
    text-decoration:none;
    color:#333;
}

.chapter:hover{
    background:#f5f5f5;
}
</style>
</head>

<body>

<h1>小说目录</h1>

<div id="toc"></div>

<script>

const repoAPI="https://api.github.com/repos/zhang1394725324/zhang1394725324.github.io/contents/xiaoshuo/chapters"

fetch(repoAPI)
.then(r=>r.json())
.then(files=>{

let chapters=files
.filter(f=>f.name.endsWith(".txt"))
.sort((a,b)=>a.name.localeCompare(b.name,'zh'))

const toc=document.getElementById("toc")

chapters.forEach((file,i)=>{

let a=document.createElement("a")

a.className="chapter"

a.href="reader.html?c="+encodeURIComponent(file.download_url)

a.innerText=(i+1)+" - "+file.name.replace(".txt","")

toc.appendChild(a)

})

})

</script>

</body>
</html>
