<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>小说阅读器</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* 全局布局 */
body{
  margin:0;
  font-family: "宋体", serif;
  height:100vh;
  display:flex;
  transition: background 0.3s, color 0.3s;
}

/* 左侧目录 */
#sidebar{
  width:25%;
  min-width:200px;
  max-width:60%;
  overflow:auto;
  border-right:1px solid #ddd;
  padding:20px;
  background:#fafafa;
  position:relative;
}

/* 右侧阅读器 */
#reader{
  flex:1;
  overflow:auto;
  padding:40px;
  font-size:18px;
  line-height:2;
}

/* 分隔拖动条 */
#divider{
  width:5px;
  cursor:col-resize;
  background:#ddd;
}
#divider:hover{
  background:#888;
}

/* 卷/章节目录样式 */
.volume{
  font-weight:bold;
  cursor:pointer;
  padding:6px 0;
  margin-top:10px;
  border-radius:4px;
  transition:0.2s;
}
.volume:hover{
  background:#d0e4ff;
}
.chapter{
  display:block;
  padding:6px 16px;
  text-decoration:none;
  color:#333;
  border-bottom:1px solid #eee;
}
.chapter:hover{
  background:#eaeaea;
}
.active{
  background:#4a8cff;
  color:white !important;
}

/* 不同卷颜色区分 */
.volume:nth-child(3n+1){background:#ffe4e1;}
.volume:nth-child(3n+2){background:#e0ffff;}
.volume:nth-child(3n+3){background:#f0fff0;}

/* 阅读器顶部导航 */
#nav{
  margin-bottom:30px;
  position:sticky;
  top:0;
  background:inherit;
  padding-bottom:10px;
  z-index:100;
}
.navbtn{
  display:inline-block;
  padding:6px 16px;
  margin-right:10px;
  border-radius:6px;
  background:#f0f0f0;
  cursor:pointer;
  transition:0.2s;
}
.navbtn:hover{
  background:#4a8cff;
  color:white;
}

/* 夜间模式 */
.night{
  background:#111;
  color:#eee;
}
.night .navbtn{
  background:#333;
}
.night .navbtn:hover{
  background:#4a8cff;
  color:white;
}

/* 手机适配 */
@media (max-width:800px){
  body{flex-direction:column;}
  #sidebar{width:100%; max-height:200px; border-right:none; border-bottom:1px solid #ddd;}
  #reader{padding:20px;}
  #divider{display:none;}
}
</style>
</head>
<body>

<!-- 左侧目录 -->
<div id="sidebar">
<h2>目录</h2>
<div id="toc"></div>
</div>

<div id="divider"></div>

<!-- 右侧阅读器 -->
<div id="reader">
<div id="nav">
<span class="navbtn" onclick="prev()">上一章</span>
<span class="navbtn" onclick="next()">下一章</span>
<span class="navbtn" id="nightmode">夜间模式</span>
<span class="navbtn" id="increase">A+</span>
<span class="navbtn" id="decrease">A-</span>
</div>
<div id="content">加载中...</div>
</div>

<script>
// GitHub API地址（根目录的 chapters 文件夹）
const api="https://api.github.com/repos/zhang1394725324/zhang1394725324.github.io/contents/xiaoshuo/chapters";

let chapters=[];
let current=0;
let tocData=[]; // [{volume:'第一卷', chapters:[{name, index}]}]

// 读取卷文件夹列表
fetch(api)
.then(r=>r.json())
.then(items=>{
  const volumeDirs = items.filter(f=>f.type==="dir"); // 卷文件夹
  let count=0;
  volumeDirs.forEach((vol,idx)=>{
    fetch(vol.url)
      .then(r=>r.json())
      .then(files=>{
        let volChapters=files.filter(f=>f.name.endsWith(".txt"))
          .sort((a,b)=>a.name.localeCompare(b.name,'zh'));

        let chapIndices=[];
        volChapters.forEach(f=>{
          chapters.push(f);
          chapIndices.push(chapters.length-1);
        });

        tocData.push({volume:vol.name, chapters:chapIndices.map(i=>({name:chapters[i].name.replace(".txt",""), index:i}))});

        count++;
        if(count===volumeDirs.length) buildTOC();
      });
  });
});

// 构建目录
function buildTOC(){
  const toc=document.getElementById("toc");
  toc.innerHTML="";
  tocData.forEach((v,vi)=>{
    const volDiv=document.createElement("div");
    volDiv.className="volume";
    volDiv.innerText=v.volume;
    volDiv.onclick=()=>{
      const sub=volDiv.nextSibling;
      if(sub.style.display==="none") sub.style.display="block";
      else sub.style.display="none";
    };
    toc.appendChild(volDiv);

    const chapDiv=document.createElement("div");
    chapDiv.style.display="block";
    v.chapters.forEach(c=>{
      const a=document.createElement("a");
      a.className="chapter";
      a.innerText=c.name;
      a.style.paddingLeft="32px"; // 多级缩进
      a.onclick=()=>loadChapter(c.index);
      chapDiv.appendChild(a);
    });
    toc.appendChild(chapDiv);
  });

  // 恢复上次阅读章节
  const last=localStorage.getItem("currentChapter");
  if(last!==null && chapters[last]) loadChapter(parseInt(last));
  else loadChapter(0);
}

// 加载章节
function loadChapter(i){
  current=i;
  localStorage.setItem("currentChapter",i);

  document.querySelectorAll(".chapter").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".chapter")[i].classList.add("active");

  if(chapters[i].contentCache){
    renderContent(chapters[i].contentCache);
    return;
  }

  fetch(chapters[i].download_url)
  .then(r=>r.text())
  .then(t=>{
    chapters[i].contentCache=t;
    renderContent(t);
  });
}

// 渲染章节
function renderContent(text){
  const lines=text.split("\n");
  const title=lines[0] || "章节标题";
  const content=lines.slice(1).join("\n");

  // 使用你的实际信息
  const author = "诛魔日记";
  const category = "Jack";
  const wordCount = ;
  const updateTime = "";
  const readCount = ;

  document.getElementById("content").innerHTML=`
    <div style="margin-bottom:8px;">
      <h2 style="display:inline-block; font-size:24px; font-weight:bold; margin:0;">${title}</h2>
      <span style="display:inline-block; background:#eee; color:#333; padding:2px 6px; margin-left:10px; font-size:14px; border-radius:4px;">${readCount}</span>
    </div>
    <div style="margin-bottom:20px; color:#888; font-size:14px;">
      <span style="margin-right:12px;">📖 ${author}</span>
      <span style="margin-right:12px;">✏️ ${category}</span>
      <span style="margin-right:12px;">📝 ${wordCount}字</span>
      <span style="margin-right:12px;">⏰ ${updateTime}</span>
    </div>
    <p style="line-height:2; font-size:18px;">${content.replace(/\n/g,"<br>")}</p>
  `;

  const scrolls=localStorage.getItem("scrollPos_"+current);
  window.scrollTo(0,scrolls?parseInt(scrolls):0);
}

// 上一章/下一章
function prev(){if(current>0) loadChapter(current-1);}
function next(){if(current<chapters.length-1) loadChapter(current+1);}

// 保存滚动位置
document.getElementById("reader").addEventListener("scroll",()=>{
  localStorage.setItem("scrollPos_"+current,document.getElementById("reader").scrollTop);
});

// 夜间模式
const nightBtn=document.getElementById("nightmode");
nightBtn.onclick=()=>{
  document.body.classList.toggle("night");
  localStorage.setItem("night",document.body.classList.contains("night"));
};
if(localStorage.getItem("night")==="true") document.body.classList.add("night");

// 字号调节
const readerDiv=document.getElementById("reader");
document.getElementById("increase").onclick=()=>readerDiv.style.fontSize=(parseInt(getComputedStyle(readerDiv).fontSize)+2)+"px";
document.getElementById("decrease").onclick=()=>readerDiv.style.fontSize=(parseInt(getComputedStyle(readerDiv).fontSize)-2)+"px";

// 键盘翻页
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") prev();
  if(e.key==="ArrowRight") next();
});

// 拖动调整宽度
const divider=document.getElementById("divider");
const sidebar=document.getElementById("sidebar");
let dragging=false;
divider.onmousedown=()=>dragging=true;
document.onmouseup=()=>dragging=false;
document.onmousemove=(e)=>{
  if(!dragging) return;
  let percent=e.clientX/window.innerWidth*100;
  sidebar.style.width=percent+"%";
}
</script>
</body>
</html>
